version: '3.8'

services:
  # app:
  #   image: python:3.11-slim
  #   build:
  #     context: ./backend
  #   environment:
  #     DATABASE_URL: postgresql+asyncpg://user:password@postgres:5435/meldb
  #   networks:
  #     - dev
  #   ports:
  #     - "8082:8080"
  #   depends_on:
  #     - postgres

  postgres:
    image: postgres:17
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: meldb
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - dev

  pgadmin:
    image: dpage/pgadmin4
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@admin.org
      PGADMIN_DEFAULT_PASSWORD: admin
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    networks:
      - dev
    depends_on:
      - postgres
  redis:
    image: redis:7-alpine
    container_name: melwiki_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  dev:
